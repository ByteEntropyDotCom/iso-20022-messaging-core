# ===============================================================
# ISO-20022 MESSAGING CORE - APPLICATION CONFIGURATION
# ===============================================================

# --- Server Configuration ---
server.port=8085
server.servlet.context-path=/
spring.main.banner-mode=off

# --- Java 21 / Project Loom Optimizations ---
# Enables Virtual Threads to handle massive concurrent XML transformations
spring.threads.virtual.enabled=true

# --- Application Identity ---
spring.application.name=iso-20022-messaging-core

# --- Jackson / XML / JSON Formatting ---
spring.jackson.serialization.indent_output=true
spring.jackson.default-property-inclusion=non_null

# --- Logging Strategy ---
logging.level.root=INFO
logging.level.com.byteentropy.iso_20022_messaging_core=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# --- Spring Boot Actuator (Observability) ---
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# --- ISO-20022 Domain Defaults ---
iso.messaging.default-instructing-agent=BANKUS33XXX
iso.messaging.schema-version=pacs.008.001.10

# --- Security ---
server.server-header=Server