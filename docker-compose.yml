services:
  iso-messaging-core:
    build: .
    container_name: iso-messaging-core
    ports:
      - "8085:8085"
    environment:
      - SPRING_THREADS_VIRTUAL_ENABLED=true
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,metrics,prometheus
      - ISO_MESSAGING_DEFAULT_INSTRUCTING_AGENT=BANKUS33XXX
    networks:
      - payment-network
    healthcheck:
      # Updated to use the full actuator path
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - payment-network

networks:
  payment-network:
    driver: bridge